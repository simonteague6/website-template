service: TEMPLATE

frameworkVersion: "3"
plugins:
  - serverless-lift

provider:
  name: aws
  region: us-east-1

custom:
  stages:
    staging:
      domain: ""
    prod:
      domain: ${env:PROD_DOMAIN, 'TEMPLATE.stsites.dev'}
      certificate: ${env:ACM_CERTIFICATE_ARN, ''}

constructs:
  website:
    type: static-website
    path: site
    domain: ${self:custom.stages.${sls:stage}.domain, ''}
    certificate: ${self:custom.stages.${sls:stage}.certificate, ''}
    errorPage: 404.html

resources:
  Conditions:
    HasCustomDomain:
      !Not [!Equals ["${self:custom.stages.${sls:stage}.domain}", ""]]
  Resources:
    DnsRecord:
      Type: AWS::Route53::RecordSet
      Condition: HasCustomDomain
      Properties:
        HostedZoneId: ${env:HOSTED_ZONE_ID, ''}
        Name: ${self:custom.stages.${sls:stage}.domain}
        Type: A
        AliasTarget:
          HostedZoneId: Z2FDTNDATAQYW2
          DNSName: ${construct:website.cname}
